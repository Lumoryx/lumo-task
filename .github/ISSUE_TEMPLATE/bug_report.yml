name: 🐛 Bug Report
description: 报告一个 Bug
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug！请尽量填写完整，方便我们快速复现和修复。

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      options:
        - P0 - 阻塞性（功能完全不可用）
        - P1 - 严重（核心功能受损）
        - P2 - 一般（非核心功能异常）
        - P3 - 轻微（视觉/体验问题）
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      placeholder: 简明描述问题现象
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      placeholder: |
        1. 进入「今日」页面
        2. 点击「开始专注」
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 应该发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 录屏
      placeholder: 拖拽图片或粘贴截图

  - type: dropdown
    id: browser
    attributes:
      label: 浏览器
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - 其他

  - type: input
    id: version
    attributes:
      label: 页面 URL / 版本
      placeholder: https://lumoryx.github.io/lumo-task/

  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      placeholder: 控制台报错、网络请求异常等

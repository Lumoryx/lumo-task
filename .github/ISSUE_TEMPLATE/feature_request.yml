name: ✨ Feature Request
description: 提出新功能或改进建议
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述清楚需求背景和期望效果。

  - type: dropdown
    id: area
    attributes:
      label: 功能模块
      options:
        - 今日 (Today)
        - 四象限矩阵 (Matrix)
        - 专注 (Focus / Pomodoro)
        - AI 功能
        - 设置 (Settings)
        - 性能
        - 工程/基础设施
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 痛点
      placeholder: |
        当前遇到了什么问题？为什么需要这个功能？
        例如：每次手动分类任务很繁琐，我希望...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      placeholder: 你设想的解决方式是什么？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      placeholder: 你是否考虑过其他方案？为什么最终选择上面的方案？

  - type: textarea
    id: mockup
    attributes:
      label: 设计草图 / 参考
      placeholder: 如有 UI 草图或参考产品，可附图或链接

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（你认为）
      options:
        - 高 - 核心体验缺失
        - 中 - 有了会更好
        - 低 - Nice to have
    validations:
      required: true
